<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Recomendador de Charlas · Talent Arena</title>

<style>
:root {
  --bg: #0b1020;
  --panel: #11162a;
  --panel-border: #1f2647;
  --text: #e6e9f2;
  --muted: #9aa0c3;
  --chip: #0f1428;
  --chip-border: #242c55;
  --primary: #6c63ff;
  --primary-strong: #7c73ff;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: Inter, system-ui, -apple-system, sans-serif;
  background: radial-gradient(1200px 600px at 50% -200px, #1a2050 0%, var(--bg) 60%);
  color: var(--text);
}

.container {
  max-width: 1100px;
  margin: 48px auto;
  padding: 0 20px;
}

.card {
  background: linear-gradient(180deg, #121733, #0e132b);
  border: 1px solid var(--panel-border);
  border-radius: 24px;
  padding: 32px;
  box-shadow: 0 30px 80px rgba(0,0,0,.4);
}

h2 {
  margin: 0 0 28px;
  font-size: 22px;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: #c7ccff;
}

.grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 24px;
}

label {
  font-size: 14px;
  font-weight: 600;
  color: var(--muted);
}

input, select, textarea {
  width: 100%;
  margin-top: 8px;
  padding: 14px 16px;
  border-radius: 14px;
  background: #0b1024;
  border: 1px solid var(--panel-border);
  color: var(--text);
  font-size: 15px;
}

textarea {
  min-height: 110px;
  resize: vertical;
}

.section {
  margin-top: 28px;
}

.chips {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 12px;
}

.chip {
  padding: 10px 16px;
  border-radius: 999px;
  background: var(--chip);
  border: 1px solid var(--chip-border);
  color: var(--muted);
  font-size: 14px;
  cursor: pointer;
  user-select: none;
  transition: all .2s ease;
}

.chip.active {
  background: linear-gradient(135deg, var(--primary), var(--primary-strong));
  border-color: transparent;
  color: #fff;
}

.cta {
  margin-top: 40px;
  width: 100%;
  padding: 18px;
  font-size: 17px;
  font-weight: 700;
  border-radius: 18px;
  border: none;
  cursor: pointer;
  color: #fff;
  background: linear-gradient(135deg, var(--primary), var(--primary-strong));
}
</style>
</head>

<body>

<div class="container">
  <div class="card">

    <h2>Cuéntanos sobre ti</h2>

    <div class="grid-2">
      <div>
        <label>Tu rol profesional</label>
        <input id="role" placeholder="Ej: Data Scientist, CTO, Desarrollador backend..." />
      </div>

      <div>
        <label>Nivel de experiencia</label>
        <select id="level">
          <option value="">Selecciona…</option>
          <option>Junior</option>
          <option>Mid</option>
          <option>Senior</option>
          <option>Lead</option>
        </select>
      </div>
    </div>

    <div class="section">
      <label>¿Qué objetivos tienes en la conferencia?</label>
      <div class="chips" id="goals">
        <div class="chip">🤖 IA y tendencias</div>
        <div class="chip">⚙️ Habilidades técnicas</div>
        <div class="chip">🤝 Networking</div>
        <div class="chip">👥 Liderazgo</div>
        <div class="chip">📈 Carrera profesional</div>
        <div class="chip">🔐 Ciberseguridad</div>
        <div class="chip">☁️ Cloud / DevOps</div>
        <div class="chip">🚀 Startups</div>
        <div class="chip">🌈 Diversidad</div>
      </div>
    </div>

    <div class="section">
      <label>Idioma preferido</label>
      <div class="chips single" id="language">
        <div class="chip active">Indiferente</div>
        <div class="chip">Español</div>
        <div class="chip">Inglés</div>
        <div class="chip">Catalán</div>
      </div>
    </div>

    <div class="section">
      <label>¿Qué días puedes asistir?</label>
      <div class="chips single" id="days">
        <div class="chip active">Todos los días</div>
        <div class="chip">2 Feb (Lunes)</div>
        <div class="chip">3 Mar (Martes)</div>
        <div class="chip">4 Mar (Miércoles)</div>
      </div>
    </div>

    <div class="section">
      <label>Cuéntanos más sobre tus intereses (opcional)</label>
      <textarea id="extra"
        placeholder="Ej: Trabajo en una startup de salud y quiero entender cómo aplicar IA en mi producto…"></textarea>
    </div>

    <button class="cta" onclick="submitForm()">
      ✨ Obtener mis recomendaciones personalizadas
    </button>

  </div>
</div>

<script>
/* === chips behaviour === */
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    const parent = chip.parentElement;
    if (parent.classList.contains('single')) {
      parent.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    }
    chip.classList.toggle('active');
  });
});

/* === submit (temporal) === */
function submitForm() {
  const data = {
    role: document.getElementById('role').value,
    level: document.getElementById('level').value,
    goals: [...document.querySelectorAll('#goals .chip.active')].map(c => c.textContent),
    language: document.querySelector('#language .chip.active')?.textContent,
    days: document.querySelector('#days .chip.active')?.textContent,
    extra: document.getElementById('extra').value
  };

  console.log('Perfil capturado:', data);
  alert('UI restaurada correctamente 👍\n\nSiguiente paso: conectar backend.');
}
</script>

</body>
</html>
