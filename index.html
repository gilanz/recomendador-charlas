<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recomendador de Charlas · Talent Arena 2026</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
  header { background: linear-gradient(135deg, #1a1f2e 0%, #0f1117 100%); border-bottom: 1px solid #2d3748; padding: 24px 32px; display: flex; align-items: center; gap: 16px; }
  header .logo { font-size: 28px; }
  header h1 { font-size: 20px; font-weight: 700; color: #fff; }
  header p { font-size: 13px; color: #718096; margin-top: 2px; }
  .container { max-width: 880px; margin: 0 auto; padding: 40px 24px; }
  .card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 16px; padding: 28px; margin-bottom: 24px; }
  .card h2 { font-size: 16px; font-weight: 600; color: #a0aec0; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 20px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
  @media (max-width: 580px) { .form-row { grid-template-columns: 1fr; } }
  label { display: block; font-size: 13px; font-weight: 600; color: #a0aec0; margin-bottom: 6px; }
  input, select, textarea { width: 100%; background: #0f1117; border: 1px solid #2d3748; border-radius: 10px; color: #e2e8f0; padding: 11px 14px; font-size: 14px; font-family: inherit; transition: border .2s; outline: none; }
  input:focus, select:focus, textarea:focus { border-color: #4f46e5; }
  textarea { resize: vertical; min-height: 90px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .chip { background: #0f1117; border: 1px solid #2d3748; border-radius: 20px; padding: 5px 14px; font-size: 12px; cursor: pointer; transition: all .15s; color: #a0aec0; user-select: none; }
  .chip.active { background: #4f46e5; border-color: #4f46e5; color: #fff; }
  .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #4f46e5, #7c3aed); border: none; border-radius: 12px; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; transition: opacity .2s, transform .1s; letter-spacing: .02em; }
  #loading { display: none; text-align: center; padding: 40px; color: #718096; font-size: 15px; }
  .spinner { width: 40px; height: 40px; border: 3px solid #2d3748; border-top-color: #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .intro-box { background: linear-gradient(135deg, #1e1b4b 0%, #1a1f2e 100%); border: 1px solid #4f46e5; border-radius: 12px; padding: 20px; margin-bottom: 28px; font-size: 14px; line-height: 1.7; color: #c7d2fe; white-space: pre-wrap; }
  .talk-card { background: #1a1f2e; border: 1px solid #2d3748; border-radius: 14px; padding: 20px; margin-bottom: 16px; }
  .rank { min-width: 36px; height: 36px; background: linear-gradient(135deg, #4f46e5, #7c3aed); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: #fff; flex-shrink: 0; }
  .talk-header { display: flex; align-items: flex-start; gap: 14px; margin-bottom: 12px; }
  .talk-title { font-size: 15px; font-weight: 700; color: #fff; line-height: 1.4; }
  .badge { background: #0f1117; border: 1px solid #2d3748; border-radius: 6px; padding: 3px 10px; font-size: 11px; color: #a0aec0; margin-right: 5px; }
  .why { font-size: 13px; color: #a0aec0; line-height: 1.6; border-top: 1px solid #2d3748; padding-top: 10px; margin-top: 10px; }
  #error { display: none; background: #2d1515; border: 1px solid #c53030; border-radius: 12px; padding: 20px; color: #fc8181; font-size: 14px; margin-top: 16px; }
</style>

<script type="importmap">
  {
    "imports": {
      "@google/generative-ai": "https://esm.run/@google/generative-ai"
    }
  }
</script>
</head>
<body>

<header>
  <div class="logo">🎯</div>
  <div>
    <h1>Recomendador de Charlas</h1>
    <p>Talent Arena 2026 · Barcelona</p>
  </div>
</header>

<div class="container">
  <div id="form-section">
    <div class="card">
      <h2>Mi Perfil Profesional</h2>
      <div class="form-row">
        <div>
          <label>Rol</label>
          <input type="text" id="role" placeholder="Ej: Backend Dev" />
        </div>
        <div>
          <label>Experiencia</label>
          <select id="level">
            <option value="Junior">Junior (0-2 años)</option>
            <option value="Mid">Mid (3-5 años)</option>
            <option value="Senior">Senior (+5 años)</option>
          </select>
        </div>
      </div>

      <label>Intereses</label>
      <div class="chips" id="goal-chips">
        <span class="chip active" data-val="IA">🤖 IA</span>
        <span class="chip" data-val="Cloud">☁️ Cloud</span>
        <span class="chip" data-val="Ciberseguridad">🔒 Seguridad</span>
        <span class="chip" data-val="Liderazgo">👥 Liderazgo</span>
      </div>

      <button class="btn" style="margin-top: 20px;" onclick="getRecommendations()">✨ Obtener Recomendaciones</button>
      <div id="error"></div>
    </div>
  </div>

  <div id="loading">
    <div class="spinner"></div>
    <p>Conectando con Gemini 1.5 Flash...</p>
  </div>

  <div id="results" style="display:none;">
    <h2>Tus Recomendaciones</h2>
    <div class="intro-box" id="intro-text"></div>
    <div id="talks-list"></div>
    <button class="btn" onclick="location.reload()">🔄 Nueva consulta</button>
  </div>
</div>

<script type="module">
import { GoogleGenerativeAI } from "@google/generative-ai";

let userApiKey = "";

// Pegamos aquí una muestra de tus charlas (puedes ampliarla)
const TALKS = [{"titulo": "Camino hacia la AGI: un camino con curvas", "fecha": "03/02/2026", "inicio": "09:30", "fin": "10:00", "ponentes": "Carlos Santana (Dot CSV)", "tema": "Inteligencia Artificial", "idioma": "Español"}, {"titulo": "El futuro del Desarrollo de Software en la era de la IA", "fecha": "03/02/2026", "inicio": "09:30", "fin": "10:00", "ponentes": "Abdel Sghiouar", "tema": "Computación en la nube", "idioma": "Inglés"}, {"titulo": "Privacidad radical: pequeñas acciones con gran impacto", "fecha": "03/02/2026", "inicio": "11:00", "fin": "11:30", "ponentes": "Martín Vigo", "tema": "Ciberseguridad", "idioma": "Español"}];

document.querySelectorAll('.chip').forEach(c => c.addEventListener('click', () => c.classList.toggle('active')));

window.getRecommendations = async function() {
    // Si la llave está vacía, la pedimos.
    if (!userApiKey) {
        userApiKey = prompt("Por favor, introduce tu Gemini API Key (la generada en Google AI Studio):");
        if (!userApiKey) return;
    }

    const role = document.getElementById('role').value;
    if (!role) { alert("Por favor, escribe tu rol profesional"); return; }

    document.getElementById('form-section').style.display = 'none';
    document.getElementById('loading').style.display = 'block';
    document.getElementById('error').style.display = 'none';

    try {
        const genAI = new GoogleGenerativeAI(userApiKey);
        
        // FORZAMOS LA VERSIÓN BETA PARA EVITAR EL ERROR DE MODELO NO ENCONTRADO
        const model = genAI.getGenerativeModel(
            { model: "gemini-1.5-flash" },
            { apiVersion: "v1beta" }
        );

        const selectedGoals = Array.from(document.querySelectorAll('.chip.active')).map(c => c.dataset.val);

        const prompt = `Eres un asistente experto. Recomienda 3 charlas de esta lista: ${JSON.stringify(TALKS)}. 
        Perfil del usuario: ${role}, Intereses: ${selectedGoals.join(",")}.
        IMPORTANTE: Responde ÚNICAMENTE un objeto JSON con este formato: {"intro": "mensaje breve", "recs": [{"titulo": "título exacto", "why": "razón breve"}]}`;

        const result = await model.generateContent(prompt);
        const response = await result.response;
        let text = response.text().replace(/```json/g, "").replace(/```/g, "").trim();
        
        const data = JSON.parse(text);
        
        document.getElementById('loading').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        document.getElementById('intro-text').innerText = data.intro;
        
        const list = document.getElementById('talks-list');
        list.innerHTML = "";
        data.recs.forEach((r, i) => {
            const talk = TALKS.find(t => t.titulo === r.titulo) || TALKS[0];
            const div = document.createElement('div');
            div.className = 'talk-card';
            div.innerHTML = `
                <div class="talk-header"><div class="rank">${i+1}</div><div class="talk-title">${talk.titulo}</div></div>
                <div><span class="badge">${talk.fecha}</span><span class="badge">${talk.idioma}</span><span class="badge">${talk.tema}</span></div>
                <div class="why">💡 ${r.why}</div>`;
            list.appendChild(div);
        });

    } catch (err) {
        console.error(err);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('form-section').style.display = 'block';
        const errDiv = document.getElementById('error');
        errDiv.style.display = 'block';
        errDiv.innerText = "Error: " + err.message + ". Asegúrate de usar una API KEY válida y activa.";
        userApiKey = ""; // Limpiamos la key fallida para que pida una nueva
    }
};
</script>
</body>
</html>
